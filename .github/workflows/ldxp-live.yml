name: LDXP Live Scan
on:
  push:
    paths:
      - 'ldxp_live_scan.py'
      - '.github/workflows/ldxp-live.yml'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  scan:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Scan live LDXP inventory
        env:
          TZ: Asia/Singapore
        run: python ldxp_live_scan.py
      - name: Commit result
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add results/latest.json results/latest.md
          git diff --cached --quiet || git commit -m 'chore: update LDXP live scan result [skip ci]'
          git push
# retrigger after workflow registration
